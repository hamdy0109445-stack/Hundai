name: Build Android APK Package

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android NDK
      run: |
        echo "NDK Path: $ANDROID_NDK_LATEST_HOME"

    - name: Compile Native C++ Library
      run: |
        mkdir -p android_app/app/src/main/jniLibs/arm64-v8a
        $ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang++ -O3 -shared main.cpp -o android_app/app/src/main/jniLibs/arm64-v8a/libelevator.so || true
        $ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang++ -O3 main.cpp -o app_executable

    - name: Package Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hyundai-Elevator-Android-Binary
        path: app_executable
        
