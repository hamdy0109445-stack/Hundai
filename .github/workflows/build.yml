name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Compile C++ into APK-ready binary
      run: |
        $ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang++ -O3 main.cpp -o app_binary

    - name: Create simple APK structure
      run: |
        mkdir -p package/assets
        cp app_binary package/assets/
        echo "#!/system/bin/sh" > package/start.sh
        echo "cd \$(dirname \$0)/assets" >> package/start.sh
        echo "./app_binary" >> package/start.sh
        chmod +x package/start.sh

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hyundai-Elevator-App
        path: package/
        
